services:
  updater:
    image: "localhost/glance-updater:latest"
    pull_policy: "never"
    hostname: "updater"
    restart: "unless-stopped"
    user: "1000:1000"
    read_only: "true"
    labels:
      traefik.enable: "true"
      traefik.http.routers.glance-updater.rule: "Host(`${GROUND_DOMAIN}`) && Path(`/hooks/glance`)"
      traefik.http.routers.glance-updater.entrypoints: "websecure"
      traefik.http.routers.glance-updater.tls.certresolver: "myresolver"
      traefik.http.services.glance-updater.loadbalancer.server.port: "9000"
    environment:
      WEBHOOK_SECRET: "${GLANCE_WEBHOOK_SECRET}"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--output-document=/dev/null",
          "--post-data=",
          "http://127.0.0.1:9000/hooks/health",
        ]
      interval: "30s"
      timeout: "5s"
      retries: 3
      start_period: "5s"
    volumes:
      - "/var/lib/glance:/repo"
      - "updater-cache:/etc/webhook"

volumes:
  updater-cache:
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"
